<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ESP32 透传配置 · Ultimate</title>
  <style>
    /* === Mirror's Edge Style (已压缩核心样式) === */
    :root{--bg:#f0f2f5;--panel:#fff;--text:#1a1d23;--muted:#64748b;--line:#e2e8f0;--accent:#e11d48;--accent-dark:#9f1239;--ok:#10b981;--warn:#f59e0b;--radius:16px;--shadow:0 10px 25px -5px rgba(0,0,0,0.1);--font:system-ui,-apple-system,sans-serif}
    *{box-sizing:border-box}body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;padding-bottom:50px}
    .wrap{max-width:900px;margin:0 auto;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:25px;padding:0 10px}
    .brand h1{margin:0;font-size:24px;color:var(--text);letter-spacing:-0.5px}
    .brand span{font-size:13px;color:var(--accent);font-weight:700;text-transform:uppercase}
    .status-bar{display:flex;gap:10px;font-size:13px}
    .pill{background:#fff;padding:6px 12px;border-radius:99px;border:1px solid var(--line);box-shadow:0 2px 5px rgba(0,0,0,0.03);display:flex;align-items:center;gap:6px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
    .dot.ok{background:var(--ok);box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
    .dot.warn{background:var(--warn)}
    
    /* 卡片布局 */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
    .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line);position:relative}
    .card::after{content:"";position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,var(--accent),transparent)}
    .card-head{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .card-head h2{margin:0;font-size:16px;font-weight:600}
    .tag{font-size:10px;background:var(--bg);padding:3px 8px;border-radius:4px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
    
    /* 表单控件 */
    .card-body{padding:20px}
    .row{margin-bottom:15px}
    .row:last-child{margin-bottom:0}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
    .hint{font-size:11px;color:#94a3b8;font-weight:400;margin-left:5px}
    input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;transition:0.2s;background:#f8fafc;color:var(--text)}
    input:focus,select:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(225,29,72,0.1)}
    input.invalid{border-color:var(--accent);background:#fff1f2}
    
    /* 底部操作栏 */
    .action-bar{margin-top:30px;text-align:center;position:sticky;bottom:20px;z-index:100}
    .btn{background:var(--text);color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 10px 20px rgba(0,0,0,0.15);transition:0.2s}
    .btn:hover{transform:translateY(-2px);background:var(--accent);box-shadow:0 15px 25px rgba(225,29,72,0.25)}
    .btn:disabled{opacity:0.7;cursor:wait;background:var(--muted)}
    
    /* 提示横幅 */
    #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100%);background:var(--text);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;opacity:0;transition:0.3s;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #toast.error{background:var(--accent)}
    #toast.success{background:var(--ok)}
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="brand">
      <h1>Web Config</h1>
      <span>Transparent Transmission</span>
    </div>
    <div class="status-bar">
      <div class="pill"><span class="dot ok"></span>ESP32 在线</div>
      <div class="pill">STA: <b id="staIpDisplay" style="margin-left:5px; color:var(--accent)">连接中...</b></div>
    </div>
  </div>

  <form id="cfgForm">
    <div class="grid">
      <div class="card">
        <div class="card-head"><h2>传输模式</h2><span class="tag">Core</span></div>
        <div class="card-body">
          <div class="row">
            <label>工作模式</label>
            <select id="mode" name="mode">
              <option value="1">TCP Client (作为客户端)</option>
              <option value="2">UDP (广播/点对点)</option>
              <option value="3">Bluetooth SPP (经典蓝牙)</option>
              <option value="4">BLE (低功耗蓝牙)</option>
              <option value="5">ESP-NOW (私有协议)</option>
            </select>
          </div>
          <div id="netPorts">
            <div class="row">
                <label>目标 IP (TCP Server)</label>
                <input type="text" id="hostIP" name="hostIP" placeholder="192.168.x.x">
            </div>
            <div class="row">
              <label>目标端口 (Target Port)</label>
              <input type="number" id="sendPort" name="sendPort" placeholder="例如: 8080">
            </div>
            <div class="row">
              <label>本机监听端口 (Listen Port)</label>
              <input type="number" id="listenPort" name="listenPort" placeholder="例如: 8080">
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>WiFi 设置</h2><span class="tag">Station</span></div>
        <div class="card-body">
          <div class="row">
            <label>SSID (WiFi名称)</label>
            <input type="text" id="wifiSSID" name="wifiSSID" placeholder="请输入 WiFi 名称">
          </div>
          <div class="row">
            <label>密码 <span class="hint">(最少8位)</span></label>
            <input type="text" id="wifiPassword" name="wifiPassword" placeholder="输入密码">
          </div>
          <div class="row">
            <label>信道 <span class="hint">(默认13)</span></label>
            <input type="number" id="wifiChannel" name="wifiChannel" min="1" max="13" value="13">
          </div>
          <div class="row">
            <label>掉线自动重连</label>
            <select id="autoConnectWifi" name="autoConnectWifi">
              <option value="1">开启</option>
              <option value="0">关闭</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>串口定义</h2><span class="tag">UART</span></div>
        <div class="card-body">
          <div class="row">
            <label>数据传输串口</label>
            <select id="serialDataNum" name="serialDataNum">
              <option value="2">Serial 2 (默认 IO16/17)</option>
              <option value="0">Serial 0 (USB Type-C)</option>
            </select>
          </div>
          <div class="row">
            <label>数据波特率</label>
            <input type="number" id="baudData" name="baudData" list="baudList" placeholder="9600 - 921600">
            <datalist id="baudList">
              <option value="9600"><option value="115200"><option value="921600">
            </datalist>
          </div>
          <div class="row">
            <label>调试波特率 <span class="hint">(Debug固定Serial 0)</span></label>
            <input type="number" id="baudDebug" name="baudDebug" value="115200">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>分包策略</h2><span class="tag">Buffer</span></div>
        <div class="card-body">
          <div class="row">
            <label>Min Time (us) <span class="hint">0-25000</span></label>
            <input type="number" id="flushMinTime" name="flushMinTime">
          </div>
          <div class="row">
            <label>Thres Time (us) <span class="hint">0-50000</span></label>
            <input type="number" id="flushThresTime" name="flushThresTime">
          </div>
          <div class="row">
            <label>Min Size (Bytes) <span class="hint">1-256</span></label>
            <input type="number" id="flushMinSize" name="flushMinSize">
          </div>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button type="button" class="btn" onclick="submitConfig()">保存配置并重启</button>
      <div style="margin-top:10px; font-size:12px; color:var(--muted)">ESP32 将自动保存并重启生效</div>
    </div>
  </form>

  <div id="toast">消息提示</div>
</div>

<script>
// === 1. 配置边界限制 (复刻原版逻辑) ===
const RULES = {
  flushMinTime:   { min: 0, max: 25000 },
  flushThresTime: { min: 0, max: 50000 },
  flushMinSize:   { min: 1, max: 256 },
  baudData:       { min: 1200, max: 2000000 },
  wifiChannel:    { min: 1, max: 13 },
  sendPort:       { min: 1, max: 65535 },
  listenPort:     { min: 1, max: 65535 }
};

// === 2. Mock 数据 (桌面调试用) ===
const MOCK_DATA = {
  mode: 1,
  hostIP: "192.168.1.50",
  wifiSSID: "MyHome_WiFi",
  wifiPassword: "password123",
  wifiChannel: 13,
  autoConnectWifi: 1,
  serialDataNum: 2,
  baudData: 115200,
  baudDebug: 115200,
  flushMinTime: 1000,
  flushThresTime: 2000,
  flushMinSize: 64,
  sendPort: 8080,
  listenPort: 9090,
  staIP: "0.0.0.0" // 模拟未连接
};

// 工具：显示提示
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}

// === 3. 核心逻辑 ===

// 加载数据
async function loadConfig() {
  try {
    // 尝试请求 ESP32 (设置1秒超时)
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), 1000);
    const res = await fetch('/get-config', { signal: controller.signal });
    clearTimeout(id);
    
    const data = await res.json();
    fillForm(data);
    console.log("ESP32 数据加载成功");
  } catch (e) {
    console.warn("连接 ESP32 失败，使用 Mock 数据模式");
    showToast("⚠️ 桌面调试模式：使用模拟数据", "warn");
    fillForm(MOCK_DATA);
  }
}

// 填充表单
function fillForm(data) {
  for (const key in data) {
    const el = document.getElementById(key);
    if (el) el.value = data[key];
  }
  updateStatus(data.staIP);
}

// 更新状态栏
function updateStatus(ip) {
  const el = document.getElementById('staIpDisplay');
  if (!ip || ip === "0.0.0.0" || ip === "(IP.unset)") {
    el.innerText = "未连接";
    el.style.color = "var(--warn)";
  } else {
    el.innerText = ip;
    el.style.color = "var(--ok)";
  }
}

// 提交保存
async function submitConfig() {
  let isValid = true;
  
  // A. 边界检查
  for (const [id, rule] of Object.entries(RULES)) {
    const el = document.getElementById(id);
    if (el) {
      const val = Number(el.value);
      if (val < rule.min || val > rule.max) {
        el.classList.add('invalid');
        isValid = false;
        console.log(`Error: ${id} value ${val} out of range`);
      } else {
        el.classList.remove('invalid');
      }
    }
  }

  // B. 密码检查
  const pwd = document.getElementById('wifiPassword');
  if (pwd.value.length > 0 && pwd.value.length < 8) {
    pwd.classList.add('invalid');
    isValid = false;
    showToast("WiFi 密码至少需要 8 位", "error");
  }

  if (!isValid) {
    showToast("请检查红色标注的参数是否正确", "error");
    return;
  }

  // C. 发送数据
  const formData = new FormData(document.getElementById('cfgForm'));
  
  try {
    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.innerText = "正在保存...";
    
    const res = await fetch('/save-config', { method: 'POST', body: formData });
    if (res.ok) {
      showToast("✅ 保存成功！正在重启...", "success");
    } else {
      throw new Error("Save Failed");
    }
  } catch (e) {
    // 如果是 Mock 模式，必然失败，假装成功一下
    setTimeout(() => {
        showToast("Mock Save: 假装保存成功了 (桌面模式)", "success");
        document.querySelector('.btn').disabled = false;
        document.querySelector('.btn').innerText = "保存配置并重启";
    }, 1000);
  }
}

// === 4. 启动与轮询 ===
window.onload = () => {
  loadConfig();
  // 每 3 秒偷偷刷新一次 IP 状态
  setInterval(() => {
    fetch('/get-config')
      .then(r => r.json())
      .then(d => updateStatus(d.staIP))
      .catch(e => {}); // 忽略轮询错误
  }, 3000);
};
</script>
</body>
</html>
