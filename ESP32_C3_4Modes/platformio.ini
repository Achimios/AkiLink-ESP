[env:esp32c3]
; ── Platform / Board ────────────────────────────────────────────────────────
platform = espressif32 @ 6.5.0
; 与 esp32dev 共用同一个 platform，不会重复下载 packages
; SuperMini 官方对应的 PlatformIO board id 就是 esp32-c3-devkitm-1
; 它们芯片相同（ESP32-C3FN4），只是外围电路略有不同，不影响编译

board = esp32-c3-devkitm-1
framework = arduino

; ── 分区表 ──────────────────────────────────────────────────────────────────
board_build.partitions = huge_app.csv
; 4MB Flash 布局：固件区 3MB，SPIFFS/LittleFS 区 1MB
; C3 没有 BT Classic（无 SPP），固件比 ESP32-32E 小不少
; 如果 3MB 对你来说太浪费，可改 min_spiffs.csv（固件1.9MB + FS1.9MB）
; 但 NimBLE 库本身就很大，保险起见维持 huge_app.csv

; ── CPU / Flash 频率 ─────────────────────────────────────────────────────────
board_build.f_cpu = 160000000L
; ⚠️ RISC-V 单核，最高只有 160MHz！写 240MHz 不会出错但实际不生效
; ESP32-C3 没有双核，代码里 xTaskCreatePinnedToCore(..., core=1) 要改成
; xTaskCreate() 或 xTaskCreatePinnedToCore(..., core=0)，否则运行会崩

board_build.flash_mode = dio
; SuperMini 硬件原生支持 QIO（比 DIO 快），但 Arduino 框架 + esp32-c3-devkitm-1
; 板定义有时在 QIO 模式下上传后上电死机，DIO 更稳。如果你追求极致速度，
; 可以改成 qio，但出问题第一个怀疑对象就是它。

board_build.f_flash = 80000000
; 80MHz 是 C3 内置 Flash 的天花板，保持不变

; ── USB-CDC（强烈推荐在 SuperMini 上开启）────────────────────────────────────
; SuperMini 的 USB-C 口直接连到 ESP32-C3 内置 USB 控制器（非 CH340/CP2102！）
; 开启后：
;   Serial  → USB-CDC（走 USB-C 口，PC 显示为 COM 口，无需额外串口模块）
;   Serial1 → 硬件 UART1（走 GPIO 引脚，接外设/对端设备）
; 关闭时：Serial → 硬件 UART0（GPIO20/21），USB-C 口只能烧录不能监视器

; ── 上传 / 监视器 ────────────────────────────────────────────────────────────
upload_port = COM8      ; SuperMini 的 USB 直连 COM 口，根据设备管理器修改
upload_speed = 460800
; SuperMini 用内置 USB-JTAG 上传（不经过 CH340），理论上可以更高
; 但 460800 是兼容性最好的值，不用冒险

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
; esp32_exception_decoder：崩溃时自动把 Backtrace 地址翻译成代码行号，神器必开

; ── 编译标志 ─────────────────────────────────────────────────────────────────
build_flags =
    -D CORE_DEBUG_LEVEL=0
    ; 0=关闭SDK内部log，data串口干净；测试时改成3或5看详细系统日志
    -O2
    ; Release级优化，比-Os速度快，代码体积稍大
    ; RISC-V工具链的-O2相当成熟，不用担心优化Bug
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; 开启USB-CDC：Serial绑到USB-C口，Serial1绑到GPIO
    ; ⚠️ 开启后上传时会多一次 USB 重枚举，COM 端口号可能变！
    ;    上传失败时长按BOOT键再上传，或双击RST进bootloader
    -D ARDUINO_USB_MODE=1
    ; 配合上面那条，启用 TinyUSB 硬件 USB 栈
    ; 两条必须同时存在，缺一不可

; ── 库依赖 ───────────────────────────────────────────────────────────────────
lib_deps =
    h2zero/NimBLE-Arduino @ ^2.2.3
    ; ESP32-C3 只有 BLE 5.0，没有经典蓝牙（BT Classic）
    ; 所以 air_spp.cpp（SPP串口蓝牙）在 C3 上不可用，编译时注意排除或用#ifdef隔离