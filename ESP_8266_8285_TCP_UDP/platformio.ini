; ============================================================
;  ESP8266 / ESP8285 (ESP-01S 1MB)  platformio.ini
;  极限性能 + 稳定优先
; ============================================================

; [platformio]
; packages_dir = .pio/packages ; 将平台包安装在项目目录下的 .pio/packages（默认在用户目录下的 .platformio/packages）


[env:esp8285]

; GitHub 镜像加速 (国内直连GitHub经常断)
; framework 包约30MB，从 ghfast.top 代理 GitHub Release 下载
; 如果 ghfast.top 挂了，换 ghproxy.net 或 gh-proxy.com
; 下载成功后可以注释掉这两行
platform_packages =
    framework-arduinoespressif8266 @ https://ghfast.top/https://github.com/esp8266/Arduino/releases/download/3.1.2/esp8266-3.1.2.zip
    ; toolchain-xtensa @ ~2.100300.0 ；如果你需要特定版本的 xtensa 工具链，可以在这里指定下载链接或版本号。默认会安装平台包里指定的版本。
 
platform = espressif8266 @ 4.2.1
; 锁定版本！不写版本号的话过几个月 pio 自动升级就炸了
; 4.2.1 对应 Arduino Core 3.1.2，是8266最终稳定版
; ESP8285 = ESP8266 + 内置1MB Flash，完全兼容

board = esp8285
; esp8285 板定义自带: flash=1MB, ldscript=eagle.flash.1m64.ld
; 如果你用的是 ESP-01(无S) 外挂512KB Flash: 改 board = esp01
; 如果你用的是 ESP-01S 外挂1MB Flash 但想用esp01_1m板定义也行，但esp8285更准确

framework = arduino


; ============================================================
;  Flash / 文件系统布局
; ============================================================
; ESP8285 默认 ldscript = eagle.flash.1m64.ld → 固件960KB + FS=64KB
; 我们需要存 config.json (≈0.5KB)，64KB绰绰有余
; 如果以后要存网页HTML文件，改成128KB:
; board_build.ldscript = eagle.flash.1m128.ld  ; 固件896KB + FS=128KB

board_build.filesystem = littlefs
; LittleFS >> SPIFFS: 支持目录、断电安全、无碎片
; 8266 Arduino Core 3.x 已内置 LittleFS，无需额外 lib


; ============================================================
;  CPU / Flash 极限性能
; ============================================================
board_build.f_cpu = 160000000L
; ESP8266 只有 80MHz 和 160MHz 两档
; 160MHz: 透传吞吐量提升约30-40%，功耗增加约20mA，稳定性OK
; 8285内置Flash，不存在ESP32那种 QIO/DIO 外挂Flash时序问题
; 所以放心拉满，不会像ESP32垃圾板子那样QIO死机 😄

board_build.f_flash = 40000000
; 8285 内置 Flash 最高支持 40MHz (不支持80MHz)
; ESP-01S 外挂 Flash 也是 40MHz
; 这里已经是天花板了

; flash_mode: 8285内置Flash只支持 DOUT，不支持 DIO/QIO/QOUT
; PlatformIO esp8285 板定义已默认 dout，无需手动设置
; 如果用 ESP-01S (外挂Flash):
;   大多数也是 DOUT，少数支持 DIO，没有支持QIO的
;   保持默认 dout 最稳


; ============================================================
;  上传 / 监视器
; ============================================================
upload_port = COM13          ; 根据实际CH340端口修改
upload_speed = 460800
; ESP8266 UART download 最高 460800 (实测稳定)
; 921600 有些CH340/CP2102芯片不稳，别冒险

upload_resetmethod = nodemcu
; nodemcu	NodeMCU 板载的 DTR+RTS 自动复位电路
; ck	CK 方案，用 RTS 拉 RST，DTR 拉 GPIO0
; none	没有自动复位，需要手动按 RST + GPIO0
; ESP-01S 没有自动复位电路，所以不管选什么都得手动操作

monitor_speed = 115200
monitor_filters = 
    esp8266_exception_decoder  ; 崩溃堆栈自动翻译成代码行号！和ESP32一样的神器
    time                       ; 时间戳
    colorize                   ; 彩色输出
; ⚠️ 注意: monitor 连的是 UART0 (数据口)
;    调试信息走 UART1 (GPIO2)，需要另一个USB-TTL看
;    如果只有一个TTL模块: DebugON=false，所有信息都走monitor
 

; ============================================================
;  编译优化
; ============================================================
build_flags = 
    -O2                        ; 发布级优化，比 -Os 更快 (牺牲一点Flash空间)
    -D CORE_DEBUG_LEVEL=0      ; 关闭SDK内部调试输出，data串口干净
    ; -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH
    ; ↑ 高带宽lwIP模式: lwIP2 MSS=1460, 更大TCP窗口
    ;   默认已是 LWIP2，如果需要更高吞吐量打开此项
    ;   但会多吃约6KB RAM，8266总共才50KB可用，谨慎开启
    -D BEARSSL_SSL_BASIC       ; 缩减SSL库体积 (我们不用HTTPS)

; build_unflags = -Os          ; 如果默认是 -Os，需要先去掉才能用 -O2
; 实测 espressif8266 默认就是无优化或 -Os，加 -O2 会覆盖


; ============================================================
;  库依赖
; ============================================================
lib_deps = 
    bblanchon/ArduinoJson @ ^6.21.0
    ; LittleFS 已内置于 Core，无需额外声明
    ; ESP8266WebServer 已内置于 Core，无需额外声明

; ============================================================
;  其他提示
; ============================================================
; 清理编译缓存:  pio run -t clean  或直接删 .pio/build/
; 上传FS文件:    pio run -t uploadfs  (会上传 data/ 目录到 LittleFS 分区)
; 如果编译爆Flash: 先检查是否 -O2 太大，换回 -Os
;   或换 eagle.flash.1m128.ld (牺牲FS空间给固件)
